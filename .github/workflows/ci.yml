name: ci

on:
  push:
    paths:
      - "**.py"
      - "**.c"
      - "**.cpp"
      - "**.cmake"
      - "**/CMakeLists.txt"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

# avoid wasted runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CTEST_NO_TESTS_ACTION: error
  CMAKE_BUILD_TYPE: Release
  CMAKE_GENERATOR: Ninja
  # for simplicity with MSVC and others


jobs:

  core:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - run: cmake -B build
    - run: cmake --build build

    - run: ctest --test-dir build -V
      if: runner.os != 'macOS'

    - run: ctest --test-dir build -E Multicast -V
      if: runner.os == 'macOS'

    - run: pip install -e .[lint,tests]
    - run: flake8
    - run: mypy .
    - run: pytest

  windows-gcc:
    runs-on: windows-latest

    strategy:
      matrix:
        c: [ {cc: gcc, cxx: g++} ]

    env:
      CC: ${{ matrix.c.cc }}
      CXX: ${{ matrix.c.cxx }}

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - run: cmake -B build
    - run: cmake --build build

    - run: ctest --test-dir build -V
      if: matrix.cc != 'cl'

    - run: ctest --test-dir build -E Multicast -V
      if: matrix.cc == 'cl'

    - run: pip install -e .[lint,tests]
    - run: flake8
    - run: mypy .
    - run: pytest
