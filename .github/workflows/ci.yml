name: ci

on:
  push:
    paths:
      - "**.py"
      - "**.c"
      - "**.cpp"
      - "**.cmake"
      - "**/CMakeLists.txt"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

# avoid wasted runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CTEST_NO_TESTS_ACTION: error
  CMAKE_BUILD_TYPE: Release
  CMAKE_GENERATOR: Ninja


jobs:

  core:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - run: cmake -B build
    - run: cmake --build build

    - run: ctest --test-dir build -V
      if: runner.os != 'macOS'

    - run: ctest --test-dir build -E Multicast -V
      if: runner.os == 'macOS'


  windows:
    runs-on: windows-latest
    timeout-minutes: 10

    strategy:
      matrix:
        # Define configurations for each build. This is more explicit than separate variables.
        config:
          - { name: "MSVC", generator: "Visual Studio 17 2022" }
          - { name: "GCC",  cc: "gcc", cxx: "g++", generator: "Ninja" }

    name: Windows-${{ matrix.config.name }}

    env:
      CMAKE_GENERATOR: ${{ matrix.config.generator }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Set environment variables
      if: matrix.config.cc
      shell: bash
      run: |
        echo "CC=${{ matrix.config.cc }}" >> $GITHUB_ENV
        echo "CXX=${{ matrix.config.cxx }}" >> $GITHUB_ENV

    - run: cmake -B build

    - run: cmake --build build
      if: matrix.config.name != 'MSVC'

    - run: cmake --build build --config Release
      if: matrix.config.name == 'MSVC'

    - run: ctest --test-dir build -V
      if: matrix.config.name != 'MSVC'

    - run: ctest --test-dir build -V -C Release
      if: matrix.config.name == 'MSVC'


  python:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - run: pip install -r requirements-dev.txt
    - run: flake8
    - run: mypy .
    - run: pytest
